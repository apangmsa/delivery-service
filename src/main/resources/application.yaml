server:
  port: 5130

spring:
  application:
    name: delivery-service
  config:
    import: 'optional:configserver: '
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

  datasource:
    url: jdbc:postgresql://localhost:5432/apang_db
    username: apang
    password: apangpass
    driver-class-name: org.postgresql.Driver
  # 임시 jpa 설정 ( 이후 config-server로 부터 받을 예정 )
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: false
    hostname: ${HOSTNAME:localhost}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:3101/eureka/}

kafka:
  topics:
    # 소비 토픽
    hub-delivery-create-requested: hub.delivery.create-requested
    # 발행 토픽
    delivery-status-changed: delivery.status-changed